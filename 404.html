<!-- PREVIEW-ONLY THEME TOGGLE (remove before launch) -->
<button id="theme-toggle-preview" style="position:fixed;bottom:1.25rem;left:1.25rem;z-index:99999;background:var(--copper);color:#fff;border:2px solid #fff;border-radius:50px;padding:.8rem 1.4rem;font-size:.85rem;font-weight:700;font-family:var(--sans);cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.5);letter-spacing:.01em">☀ Toggle Light Mode</button>
<script>
(function(){
  var btn = document.getElementById('theme-toggle-preview');
  var saved = localStorage.getItem('solano-theme-preview');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  function updateLabel(){
    btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? 'Toggle Dark Mode' : 'Toggle Light Mode';
  }
  updateLabel();
  btn.addEventListener('click', function(){
    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('solano-theme-preview', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      localStorage.setItem('solano-theme-preview', 'light');
    }
    updateLabel();
  });
})();
</script>
