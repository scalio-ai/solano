<!-- THEME TOGGLE (floating eye icon, default theme is light) -->
<button id="theme-toggle-preview" aria-label="Switch to dark mode" style="position:fixed;bottom:1.25rem;left:1.25rem;z-index:99999;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--copper);border:2px solid #fff;border-radius:50%;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.35)">
  <svg id="theme-toggle-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
<script>
(function(){
  var btn = document.getElementById('theme-toggle-preview');
  var icon = document.getElementById('theme-toggle-icon');
  var EYE_OPEN = '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/>';
  var EYE_CLOSED = '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  var saved = localStorage.getItem('solano-theme-preview');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  function updateIcon(){
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    icon.innerHTML = isDark ? EYE_CLOSED : EYE_OPEN;
    btn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
  }
  updateIcon();
  btn.addEventListener('click', function(){
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('solano-theme-preview', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('solano-theme-preview', 'dark');
    }
    updateIcon();
  });
})();
</script>
