<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#090c14"/>
  <!-- Top ray -->
  <line x1="32" y1="5" x2="32" y2="13" stroke="#C47A3C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Upper-left ray -->
  <line x1="17" y1="9" x2="22" y2="17" stroke="#C47A3C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Upper-right ray -->
  <line x1="47" y1="9" x2="42" y2="17" stroke="#C47A3C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left ray -->
  <line x1="6" y1="23" x2="14" y2="26" stroke="#C47A3C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right ray -->
  <line x1="58" y1="23" x2="50" y2="26" stroke="#C47A3C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Sun semicircle arc -->
  <path d="M11 38 A21 21 0 0 1 53 38" stroke="#C47A3C" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Horizon line 1 (widest) -->
  <line x1="7" y1="43" x2="57" y2="43" stroke="#C47A3C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Horizon line 2 -->
  <line x1="14" y1="50" x2="50" y2="50" stroke="#C47A3C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Horizon line 3 (narrowest) -->
  <line x1="21" y1="57" x2="43" y2="57" stroke="#C47A3C" stroke-width="3.5" stroke-linecap="round"/>
</svg>
